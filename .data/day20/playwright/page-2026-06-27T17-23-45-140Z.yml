              - generic [ref=e207]:
                - generic [ref=e208]: MCP (Model Context Protocol) is an open-source standard for connecting AI applications to external systems.
                - generic [ref=e209]: Using MCP, AI applications like Claude or ChatGPT can connect to data sources (e.g. local files, databases), tools (e.g. search engines, calculators) and workflows (e.g. specialized prompts)—enabling them to access key information and perform tasks.
                - generic [ref=e210]: Think of MCP like a USB-C port for AI applications. Just as USB-C provides a standardized way to connect electronic devices, MCP provides a standardized way to connect AI applications to external systems.
                - generic [ref=e215]:
                  - img [ref=e218]
                  - generic:
                    - button "Expand image"
                - heading "Navigate to header What can MCP enable?" [level=2] [ref=e219]:
                  - link "Navigate to header" [ref=e220] [cursor=pointer]:
                    - /url: "#what-can-mcp-enable"
                    - img [ref=e222]
                  - generic [ref=e224] [cursor=pointer]: What can MCP enable?
                - list [ref=e225]:
                  - listitem [ref=e226]: Agents can access your Google Calendar and Notion, acting as a more personalized AI assistant.
                  - listitem [ref=e227]: Claude Code can generate an entire web app using a Figma design.
                  - listitem [ref=e228]: Enterprise chatbots can connect to multiple databases across an organization, empowering users to analyze data using chat.
                  - listitem [ref=e229]: AI models can create 3D designs on Blender and print them out using a 3D printer.
                - heading "Navigate to header Why does MCP matter?" [level=2] [ref=e230]:
                  - link "Navigate to header" [ref=e231] [cursor=pointer]:
                    - /url: "#why-does-mcp-matter"
                    - img [ref=e233]
                  - generic [ref=e235] [cursor=pointer]: Why does MCP matter?
                - generic [ref=e236]: Depending on where you sit in the ecosystem, MCP can have a range of benefits.
                - list [ref=e237]:
                  - listitem [ref=e238]:
                    - strong [ref=e239]: Developers
                    - text: ": MCP reduces development time and complexity when building, or integrating with, an AI application or agent."
                  - listitem [ref=e240]:
                    - strong [ref=e241]: AI applications or agents
                    - text: ": MCP provides access to an ecosystem of data sources, tools and apps which will enhance capabilities and improve the end-user experience."
                  - listitem [ref=e242]:
                    - strong [ref=e243]: End-users
                    - text: ": MCP results in more capable AI applications or agents which can access your data and take actions on your behalf when necessary."
