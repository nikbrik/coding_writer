                - generic [ref=e516]:
                  - heading "Ref MCP" [level=1] [ref=e517]
                  - 'link "Permalink: Ref MCP" [ref=e518] [cursor=pointer]':
                    - /url: "#ref-mcp"
                    - img [ref=e519]
                - paragraph [ref=e521]:
                  - text: A
                  - link "ModelContextProtocol" [ref=e522] [cursor=pointer]:
                    - /url: https://modelcontextprotocol.io
                  - text: server that gives your AI coding tool or agent access to documentation for APIs, services, libraries etc. It's your one-stop-shop to keep your agent up-to-date on documentation in a fast and token-efficient way.
                - paragraph [ref=e523]:
                  - text: For more see info
                  - link "ref.tools" [ref=e524] [cursor=pointer]:
                    - /url: https://ref.tools
                - generic [ref=e525]:
                  - heading "Agentic search for exactly the right context" [level=2] [ref=e526]
                  - 'link "Permalink: Agentic search for exactly the right context" [ref=e527] [cursor=pointer]':
                    - /url: "#agentic-search-for-exactly-the-right-context"
                    - img [ref=e528]
                - paragraph [ref=e530]:
                  - text: Ref's tools are designed to match how models search while using as little context as possible to reduce
                  - link "context rot" [ref=e531] [cursor=pointer]:
                    - /url: https://research.trychroma.com/context-rot
                  - text: . The goal is to find exactly the context your coding agent needs to be successful while using minimum tokens.
                - paragraph [ref=e532]: Depending on the complexity of the prompt, LLM coding agents like Claude Code will typically do one or more searches and then choose a few resources to read in more depth.
                - paragraph [ref=e533]: "For a simple query about Figma's Comment REST API it will make a couple calls to get exactly what it needs:"
                - generic [ref=e534]:
                  - code [ref=e536]: SEARCH 'Figma API post comment endpoint documentation' (54 tokens) READ https://www.figma.com/developers/api#post-comments-endpoint (385 tokens)
                  - button "Copy code to clipboard" [ref=e538] [cursor=pointer]:
                    - img [ref=e539]
                - paragraph [ref=e542]: "For more complex situations, the LLM will try to refine it's prompt as it reads results. For example:"
                - generic [ref=e543]:
                  - code [ref=e545]: SEARCH 'n8n merge node vs Code node multiple inputs best practices' (126) READ https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.merge/#merge (4961) READ https://docs.n8n.io/flow-logic/merging/#merge-data-from-multiple-node-executions (138) SEARCH 'n8n Code node multiple inputs best practices when to use' (107) READ https://docs.n8n.io/code/code-node/#usage (80) SEARCH 'n8n Code node access multiple inputs from different nodes' (370) SEARCH 'n8n Code node $input access multiple node inputs' (372) READ https://docs.n8n.io/code/builtin/output-other-nodes/#output-of-other-nodes (2310)
                  - button "Copy code to clipboard" [ref=e547] [cursor=pointer]:
                    - img [ref=e548]
                - paragraph [ref=e551]: Ref takes advantage of MCP sessions to track search trajectory and minimize context usage. There's a lot more ideas cooking but here's what we've implemented so far.
                - generic [ref=e552]:
                  - heading "1. Filtering search results" [level=3] [ref=e553]
                  - 'link "Permalink: 1. Filtering search results" [ref=e554] [cursor=pointer]':
                    - /url: "#1-filtering-search-results"
                    - img [ref=e555]
                - paragraph [ref=e557]: For repeated similar searches in a session, Ref will never return repeated results. Traditionally, you dig farther in to search results by paging to the next result but this approach allows the agent to page AND adjust the prompt at the same time.
                - generic [ref=e558]:
                  - heading "2. Fetching the part of the page that matters" [level=3] [ref=e559]
                  - 'link "Permalink: 2. Fetching the part of the page that matters" [ref=e560] [cursor=pointer]':
                    - /url: "#2-fetching-the-part-of-the-page-that-matters"
                    - img [ref=e561]
                - paragraph [ref=e563]:
                  - text: When reading a page of documentation, Ref will use the agent's session search history to dropout less relevant sections and return the most relevant 5k tokens. This helps Ref avoid a big problem with standard
                  - code [ref=e564]: fetch()
                  - text: web scraping which is when it hits a large documentation page you can easily end up pull in 20k+ tokens into context, most of which are irrelevant.
                - generic [ref=e565]:
                  - heading "Why does minimizing tokens from documentation context matter?" [level=2] [ref=e566]
                  - 'link "Permalink: Why does minimizing tokens from documentation context matter?" [ref=e567] [cursor=pointer]':
                    - /url: "#why-does-minimizing-tokens-from-documentation-context-matter"
                    - img [ref=e568]
                - generic [ref=e570]:
                  - heading "1. More context makes models dumber" [level=3] [ref=e571]
                  - 'link "Permalink: 1. More context makes models dumber" [ref=e572] [cursor=pointer]':
                    - /url: "#1-more-context-makes-models-dumber"
                    - img [ref=e573]
                - paragraph [ref=e575]:
                  - text: It's well documented that as of July 2025 that models get dumber as you put in more tokens. You might have heard about how models are great with long context now and that's kind of true but not the whole picture. For a quick primer on some research,
                  - link "checkout this video from the team at Chroma" [ref=e576] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=TUjQuC4ugak
                  - text: .
                - generic [ref=e577]:
                  - heading "2. Tokens cost $$$" [level=3] [ref=e578]
                  - 'link "Permalink: 2. Tokens cost $$$" [ref=e579] [cursor=pointer]':
                    - /url: "#2-tokens-cost-"
                    - img [ref=e580]
                - paragraph [ref=e582]: Imagine you are using Claude Opus as a background agent and you start by having the agent pull in documentation context and suppose it pulls in 10000 tokens of context with 4000 being relevant and 6000 being extra noise. At API pricing, that 6k tokens cost about $0.09 PER STEP. If one prompt ends up taking 11 steps with Opus, you've spent $1 for no reason.
                - generic [ref=e583]:
                  - heading "Setup" [level=2] [ref=e584]
                  - 'link "Permalink: Setup" [ref=e585] [cursor=pointer]':
                    - /url: "#setup"
                    - img [ref=e586]
                - paragraph [ref=e588]: There are two options for setting up Ref as an MCP server, either via the streamable-http server (recommended) or local stdio server (legacy).
                - paragraph [ref=e589]: This repo contains the legacy stdio server.
                - generic [ref=e590]:
                  - heading "Streamable HTTP (recommended)" [level=3] [ref=e591]
